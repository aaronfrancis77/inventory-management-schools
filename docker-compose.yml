services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend/DaymapInventory
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db;Database=DaymapInventory;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      InventorySettings__LocalTimeZone: "AUS Eastern Standard Time"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqldata:
